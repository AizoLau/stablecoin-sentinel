[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
